version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sat_postgres
    environment:
      POSTGRES_DB: sat_reading
      POSTGRES_USER: sat_user
      POSTGRES_PASSWORD: sat_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sat_user -d sat_reading']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sat_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: sat_ai_service
    ports:
      - '8000:8000'
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DATABASE_URL: postgresql://sat_user:sat_password@postgres:5432/sat_reading
      REDIS_URL: redis://redis:6379
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
